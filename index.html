<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ⚡ CRITICAL: inline black background — prevents white flash before CSS loads -->
    <style>
      html, body { background: #000; margin: 0; padding: 0; }
      #root { min-height: 100vh; }
      /* Minimal inline loader: shows immediately, replaced once React mounts */
      .inline-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #000; color: rgba(255,255,255,0.7);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px; letter-spacing: 0.12em;
        transition: opacity 0.3s ease;
      }
      .inline-loader--hidden { opacity: 0; pointer-events: none; }
    </style>
    <!-- Fonts preload with LOW priority — don't block main bundle -->
    <link rel="preload" as="font" type="font/woff2" href="%BASE_URL%fonts/fusion-pixel-12px-monospaced-latin.woff2" crossorigin fetchpriority="low" />
    <link rel="preload" as="font" type="font/woff2" href="%BASE_URL%fonts/fusion-pixel-12px-monospaced-zh-hans.woff2" crossorigin fetchpriority="low" />
    <title>Portfolio</title>
  </head>
  <body>
    <div class="inline-loader" id="inline-loader">SIVAN PORTFOLIO — LOADING</div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide inline loader once React mounts (failsafe 3s fallback)
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const el = document.getElementById('inline-loader');
          if (el) el.classList.add('inline-loader--hidden');
        }, 3000);
      });
    </script>
  </body>
</html>

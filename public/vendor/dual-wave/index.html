<!DOCTYPE html>
<html lang="en" class="js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dual wave text animation with two columns"
    />
    <meta name="keywords" content="text animation, scroll, gsap, wave" />
    <title>Dual Wave Text Animation</title>
    <script type="module" crossorigin src="./assets/main-BzQOPG-Z.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-Cd5BlB9D.css">
    <script type="module">
      const getSiteBasePath = () => {
        const marker = "/vendor/dual-wave/";
        const markerIndex = window.location.pathname.indexOf(marker);
        if (markerIndex < 0) return "";
        const basePath = window.location.pathname.slice(0, markerIndex);
        return basePath.endsWith("/") ? basePath.slice(0, -1) : basePath;
      };

      const siteBasePath = getSiteBasePath();

      const withSiteBase = (value) => {
        if (!value || !value.startsWith("/") || value.startsWith("//") || !siteBasePath) {
          return value;
        }
        return `${siteBasePath}${value}`;
      };

      const normalizePreviewAssets = (root = document) => {
        const scope = root instanceof Element || root instanceof Document ? root : document;
        const imageNodes = scope.querySelectorAll?.(".dual-wave-wrapper .wave-column-left .animated-text[data-image]");
        imageNodes?.forEach((node) => {
          const currentImage = node.getAttribute("data-image");
          const normalizedImage = withSiteBase(currentImage);
          if (currentImage && normalizedImage !== currentImage) {
            node.setAttribute("data-image", normalizedImage);
          }
        });

        const thumbnailNodes = scope.querySelectorAll?.(".dual-wave-wrapper .image-thumbnail");
        thumbnailNodes?.forEach((node) => {
          const currentSrc = node.getAttribute("src");
          const normalizedSrc = withSiteBase(currentSrc);
          if (currentSrc && normalizedSrc !== currentSrc) {
            node.setAttribute("src", normalizedSrc);
          }
        });
      };

      const getReferrerOrigin = () => {
        if (!document.referrer) return "";
        try {
          return new URL(document.referrer).origin;
        } catch {
          return "";
        }
      };

      const getPostTargetOrigin = () => {
        const referrerOrigin = getReferrerOrigin();
        return referrerOrigin || "http://127.0.0.1:5177" || "*";
      };

      // Preload all preview cover images into browser cache so they're ready when swiping.
      // Called AFTER normalizePreviewAssets(), so data-image/src attrs already have siteBase applied — use them directly.
      const preloadPreviewAssets = () => {
        const preloaded = new Set();

        // From animated-text data-image attrs (already normalized by normalizePreviewAssets)
        document.querySelectorAll(
          ".dual-wave-wrapper .wave-column-left .animated-text[data-image]"
        ).forEach((node) => {
          const src = node.getAttribute("data-image");
          if (!src || preloaded.has(src)) return;
          preloaded.add(src);
          const link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          link.href = src; // Already normalized — use directly, don't call withSiteBase again
          link.fetchPriority = "low";
          document.head.appendChild(link);
        });

        // Also preload the thumbnail image with high priority
        const thumb = document.querySelector("img.image-thumbnail");
        if (thumb) {
          const thumbSrc = thumb.getAttribute("src") || thumb.src;
          if (thumbSrc && !preloaded.has(thumbSrc)) {
            const link = document.createElement("link");
            link.rel = "preload";
            link.as = "image";
            link.href = thumbSrc;
            link.fetchPriority = "high";
            document.head.appendChild(link);
          }
        }
      };

      let openDispatchLocked = false;

      const findSlugByThumbnail = () => {
        const thumbnail = document.querySelector(".image-thumbnail");
        const currentImage = thumbnail?.getAttribute("src");
        if (currentImage) {
          const exactImageMatch = document.querySelector(
            `.dual-wave-wrapper .wave-column-left .animated-text[data-image="${CSS.escape(currentImage)}"]`,
          );
          if (exactImageMatch?.dataset?.slug) {
            return exactImageMatch.dataset.slug;
          }
        }

        const currentTitle =
          document.querySelector(".image-thumbnail-title")?.textContent?.trim() || "";
        if (currentTitle) {
          const exactTitleMatch = Array.from(
            document.querySelectorAll(".dual-wave-wrapper .wave-column-left .animated-text"),
          ).find((item) => item.textContent?.trim() === currentTitle || item.dataset?.title === currentTitle);
          if (exactTitleMatch?.dataset?.slug) {
            return exactTitleMatch.dataset.slug;
          }
        }

        return null;
      };

      const resolveCurrentSlug = () => {
        const thumbnailSlug = findSlugByThumbnail();
        if (thumbnailSlug) {
          return thumbnailSlug;
        }

        const focused = document.querySelector(
          ".dual-wave-wrapper .wave-column-left .focused",
        );
        if (focused?.dataset?.slug) {
          return focused.dataset.slug;
        }

        return (
          document.querySelector(".dual-wave-wrapper .wave-column-left .animated-text")
            ?.dataset?.slug || null
        );
      };

      const notifyOpenWorkDetail = () => {
        if (openDispatchLocked) return true;
        const slug = resolveCurrentSlug();
        if (!slug || window.parent === window) return false;

        openDispatchLocked = true;
        window.setTimeout(() => {
          openDispatchLocked = false;
        }, 320);

        window.parent?.postMessage(
          {
            type: "sequence:openWorkDetail",
            slug,
          },
          getPostTargetOrigin(),
        );
        return true;
      };

      const bindOverrideHandlers = () => {
        const thumbnailTargets = document.querySelectorAll(
          ".image-thumbnail-wrapper, .image-thumbnail, .image-thumbnail-title, .image-thumbnail-year",
        );
        thumbnailTargets.forEach((thumbnailTarget) => {
          thumbnailTarget.addEventListener(
            "click",
            (event) => {
              if (notifyOpenWorkDetail()) {
                event.preventDefault();
                event.stopImmediatePropagation();
                event.stopPropagation();
              }
            },
            true,
          );
        });

        const leftColumn = document.querySelector(".wave-column-left");
        if (leftColumn) {
          leftColumn.addEventListener(
            "click",
            (event) => {
              const item = event.target?.closest?.(".animated-text");
              if (!item) {
                return;
              }

              const slug = item.dataset?.slug || resolveCurrentSlug();
              if (!slug || window.parent === window) {
                return;
              }

              window.parent?.postMessage(
                {
                  type: "sequence:openWorkDetail",
                  slug,
                },
                getPostTargetOrigin(),
              );
              event.preventDefault();
              event.stopImmediatePropagation();
              event.stopPropagation();
            },
            true,
          );
        }
      };

      const onReady = () => {
        if (!document.querySelector(".dual-wave-wrapper")) {
          window.setTimeout(onReady, 120);
          return;
        }
        normalizePreviewAssets();
        bindOverrideHandlers();
        preloadPreviewAssets();

        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === "attributes" && mutation.target instanceof HTMLElement) {
              normalizePreviewAssets(mutation.target);
              return;
            }

            mutation.addedNodes.forEach((node) => {
              if (node instanceof HTMLElement) {
                normalizePreviewAssets(node);
              }
            });
          });
        });

        observer.observe(document.body, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ["src", "data-image"],
        });
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", onReady, { once: true });
      } else {
        onReady();
      }
    </script>
  </head>
  <body class="loading">
    <main id="smooth-wrapper" class="container">
      <div id="smooth-content">
        <div class="spacer"></div>
        <div
          class="dual-wave-wrapper"
          data-animation="dual-wave"
          data-wave-number="12"
          data-wave-speed="1"
        >
          <div class="wave-column wave-column-left"></div>
          <div class="image-thumbnail-wrapper">
            <div class="image-thumbnail-label image-thumbnail-title">礦-Kuang</div>
            <img
              src="/portfolio/portfolio-web/kuang/礦品牌设计/封面.png.webp"
              alt="Selected portfolio work"
              class="image-thumbnail"
              fetchpriority="high"
            />
            <div class="image-thumbnail-label image-thumbnail-year">2026</div>
          </div>
          <div class="wave-column wave-column-right"></div>
        </div>
        <div class="spacer-bottom"></div>
      </div>
    </main>
  </body>
</html>
